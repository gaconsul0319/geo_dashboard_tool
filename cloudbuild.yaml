steps:  
  # 1. 金庫（Secret Manager）からFirebaseの合鍵を取り出し、backendフォルダに配置する
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'gcloud secrets versions access latest --secret=FIREBASE_CREDENTIALS > backend/firebase-credentials.json'

  # 2. バックエンドのコンテナ（サーバー環境）を組み立てる
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/geo-backend', './backend']

  # 3. バックエンドのコンテナをGCPの保管庫にプッシュ（送信）する
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/geo-backend']

  # 4. バックエンドをCloud Runサーバーに配置して公開する
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: ['run', 'deploy', 'geo-backend', '--image', 'gcr.io/$PROJECT_ID/geo-backend', '--region', 'asia-northeast1', '--allow-unauthenticated']

  # 5. フロントエンドの準備（部品のインストールとビルド）
  - name: 'node:20'
    dir: 'frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install
        npm run build

  # 6. フロントエンドをFirebase Hostingへデプロイする
  # 6. フロントエンドをFirebase Hostingへデプロイする
  - name: 'node:20'
    dir: 'frontend'
    entrypoint: 'npx'
    args: ['firebase-tools', 'deploy', '--only', 'hosting:ga-geo-viewer-test', '--project', '$PROJECT_ID']

# タイムアウト時間（処理に時間がかかる場合に備えて長めに設定）
timeout: '1200s'

# ログの保存先をCloud Loggingに指定
options:
  logging: CLOUD_LOGGING_ONLY